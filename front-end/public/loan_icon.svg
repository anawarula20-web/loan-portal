<svg width="300" height="200" viewBox="0 0 300 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .title { font: bold 28px Arial, sans-serif; fill: #1e3a8a; }
    .icon { fill: #3b82f6; }
    .accent { fill: #f59e0b; }
  </style>

  <!-- Document -->
  <rect x="110" y="20" width="80" height="100" rx="10" fill="#e5e7eb" stroke="#9ca3af"/>
  <text x="150" y="60" text-anchor="middle" font-size="14" fill="#374151">LOAN</text>

  <!-- Check marks -->
  <line x1="120" y1="75" x2="130" y2="85" stroke="green" stroke-width="2"/>
  <line x1="130" y1="85" x2="145" y2="65" stroke="green" stroke-width="2"/>

  <line x1="120" y1="95" x2="130" y2="105" stroke="green" stroke-width="2"/>
  <line x1="130" y1="105" x2="145" y2="85" stroke="green" stroke-width="2"/>

  <!-- Money -->
  <rect x="50" y="80" width="60" height="30" rx="5" fill="#3b82f6"/>
  <text x="80" y="100" text-anchor="middle" fill="white">$</text>

  <!-- Coin -->
  <circle cx="210" cy="90" r="20" fill="#f59e0b"/>
  <text x="210" y="95" text-anchor="middle" fill="white">$</text>

  <!-- Calculator -->
  <rect x="230" y="60" width="40" height="60" rx="5" fill="#6b7280"/>
  <circle cx="240" cy="75" r="3" fill="white"/>
  <circle cx="255" cy="75" r="3" fill="white"/>
  <circle cx="240" cy="90" r="3" fill="white"/>
  <circle cx="255" cy="90" r="3" fill="white"/>

  <!-- Title -->
  <text x="150" y="170" text-anchor="middle" font-size="28" fill="#1e3a8a" font-weight="bold">LOAN</text>
</svg>
